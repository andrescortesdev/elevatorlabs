<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elevator Labs — El futuro está ascendiendo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#050810;
    --bg-1:#0a1020;
    --bg-2:#0e1730;
    --cyan:#2dd4e8;
    --cyan-dim:#1a8ea3;
    --blue:#3b7bf6;
    --ink-0:#eaf6f8;
    --ink-1:#9fb4c4;
    --ink-2:#5b7185;
    --line:rgba(45,212,232,0.14);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:var(--bg-0);
    color:var(--ink-0);
    font-family:'Chakra Petch',sans-serif;
    overflow-x:hidden;
    position:relative;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
  }

  /* ---------- background layers ---------- */
  .bg-grid{
    position:fixed; inset:0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size:56px 56px;
    -webkit-mask-image: radial-gradient(ellipse 90% 70% at 50% 35%, black 20%, transparent 75%);
    mask-image: radial-gradient(ellipse 90% 70% at 50% 35%, black 20%, transparent 75%);
    z-index:0;
  }
  .bg-glow{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(600px 380px at 50% 8%, rgba(45,212,232,0.16), transparent 65%),
      radial-gradient(900px 500px at 85% 90%, rgba(59,123,246,0.10), transparent 60%),
      radial-gradient(700px 400px at 10% 85%, rgba(45,212,232,0.06), transparent 60%);
  }
  .bg-vignette{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background: radial-gradient(ellipse 120% 100% at 50% 50%, transparent 55%, var(--bg-0) 100%);
  }

  /* rising particles = the shaft */
  .particles{
    position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;
  }
  .particle{
    position:absolute;
    bottom:-10px;
    width:2px; height:2px;
    border-radius:50%;
    background:var(--cyan);
    box-shadow:0 0 6px 1px rgba(45,212,232,0.8);
    opacity:0;
    animation:rise linear infinite;
  }
  @keyframes rise{
    0%{ transform:translateY(0) scale(0.6); opacity:0; }
    8%{ opacity:0.9; }
    90%{ opacity:0.5; }
    100%{ transform:translateY(-110vh) scale(1); opacity:0; }
  }

  /* ---------- floor indicator rail (signature element) ---------- */
  .rail{
    position:fixed;
    right:clamp(14px, 4vw, 56px);
    top:50%;
    transform:translateY(-50%);
    z-index:5;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    font-family:'JetBrains Mono',monospace;
  }
  .rail-track{
    position:relative;
    width:1px;
    height:220px;
    background:linear-gradient(to bottom, transparent, var(--cyan-dim) 15%, var(--cyan-dim) 85%, transparent);
    opacity:0.5;
  }
  .rail-car{
    position:absolute;
    left:50%; transform:translateX(-50%);
    width:9px; height:9px;
    border-radius:2px;
    background:var(--cyan);
    box-shadow:0 0 12px 3px rgba(45,212,232,0.75);
    animation:ascend 5.5s cubic-bezier(.65,0,.35,1) infinite;
  }
  @keyframes ascend{
    0%{ top:100%; }
    45%{ top:0%; }
    55%{ top:0%; }
    100%{ top:100%; }
  }
  .rail-label{
    font-size:10px;
    letter-spacing:0.18em;
    color:var(--ink-2);
    writing-mode:vertical-rl;
    text-orientation:mixed;
  }
  @media (max-width: 860px){ .rail{ display:none; } }

  /* ---------- hero ---------- */
  .hero{
    position:relative;
    z-index:2;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:120px 24px 100px;
  }

  .mark{
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:44px;
    opacity:0;
    animation:fadeUp 0.8s ease-out 0.1s forwards;
  }
  .mark svg{ width:38px; height:38px; filter:drop-shadow(0 0 10px rgba(45,212,232,0.5)); }
  .mark-text{
    font-size:15px;
    font-weight:600;
    letter-spacing:0.24em;
    color:var(--ink-1);
  }

  .badge{
    display:inline-flex;
    align-items:center;
    gap:9px;
    padding:8px 18px;
    border:1px solid var(--line);
    border-radius:100px;
    background:rgba(45,212,232,0.04);
    backdrop-filter:blur(6px);
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.2em;
    color:var(--cyan);
    margin-bottom:40px;
    opacity:0;
    animation:fadeUp 0.8s ease-out 0.25s forwards;
  }
  .badge-dot{
    width:6px; height:6px; border-radius:50%;
    background:var(--cyan);
    box-shadow:0 0 8px 2px rgba(45,212,232,0.9);
    animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ opacity:1; transform:scale(1); }
    50%{ opacity:0.4; transform:scale(0.75); }
  }

  h1{
    font-size:clamp(40px, 8vw, 96px);
    font-weight:700;
    line-height:0.98;
    letter-spacing:-0.02em;
    text-transform:uppercase;
    max-width:1100px;
    opacity:0;
    animation:fadeUp 0.9s ease-out 0.4s forwards;
  }
  h1 .line2{
    background:linear-gradient(100deg, var(--ink-0) 20%, var(--cyan) 55%, var(--blue) 90%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }

  .sub{
    margin-top:30px;
    max-width:600px;
    font-size:clamp(15px, 1.9vw, 18px);
    line-height:1.6;
    color:var(--ink-1);
    font-weight:400;
    opacity:0;
    animation:fadeUp 0.9s ease-out 0.55s forwards;
  }

  /* countdown, reframed as system status rather than a promo timer */
  .status-panel{
    margin-top:64px;
    display:flex;
    align-items:stretch;
    border:1px solid var(--line);
    border-radius:14px;
    background:linear-gradient(180deg, rgba(14,23,48,0.6), rgba(10,16,32,0.6));
    backdrop-filter:blur(10px);
    box-shadow:0 20px 60px -20px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.03);
    overflow:hidden;
    opacity:0;
    animation:fadeUp 0.9s ease-out 0.7s forwards;
  }
  .unit{
    position:relative;
    padding:28px 34px;
    text-align:center;
  }
  .unit + .unit{ border-left:1px solid var(--line); }
  .unit-value{
    font-family:'JetBrains Mono',monospace;
    font-size:clamp(34px, 5vw, 52px);
    font-weight:600;
    color:var(--cyan);
    text-shadow:0 0 22px rgba(45,212,232,0.55);
    line-height:1;
  }
  .unit-label{
    margin-top:10px;
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;
    letter-spacing:0.22em;
    color:var(--ink-2);
  }

  .footnote{
    margin-top:26px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.15em;
    color:var(--ink-2);
    opacity:0;
    animation:fadeUp 0.9s ease-out 0.85s forwards;
  }
  .footnote b{ color:var(--cyan-dim); font-weight:600; }

  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(18px); }
    to{ opacity:1; transform:translateY(0); }
  }

  @media (max-width:520px){
    .unit{ padding:20px 16px; }
    .status-panel{ flex-wrap:wrap; }
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="particles" id="particles"></div>
<div class="bg-vignette"></div>

<div class="rail">
  <span class="rail-label">NIVEL DE OPERACIÓN</span>
  <div class="rail-track"><div class="rail-car"></div></div>
</div>

<section class="hero">

  <div class="mark">
    <svg viewBox="0 0 48 48" fill="none">
      <path d="M8 40L20 8L20 40" stroke="#2dd4e8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M20 24L38 24" stroke="#2dd4e8" stroke-width="3" stroke-linecap="round"/>
      <path d="M28 16L38 24L28 32" stroke="#eaf6f8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="mark-text">ELEVATOR&nbsp;LABS</span>
  </div>

  <div class="badge">
    <span class="badge-dot"></span>
    SISTEMAS INICIANDO
  </div>

  <h1>
    EL FUTURO ESTÁ<br>
    <span class="line2">ASCENDIENDO.</span>
  </h1>

  <p class="sub">
    Estamos construyendo la próxima frontera de la tecnología de elevación.
    Algo monumental está por llegar.
  </p>

  <div class="status-panel">
    <div class="unit"><div class="unit-value" id="d">00</div><div class="unit-label">DÍAS</div></div>
    <div class="unit"><div class="unit-value" id="h">00</div><div class="unit-label">HORAS</div></div>
    <div class="unit"><div class="unit-value" id="m">00</div><div class="unit-label">MINS</div></div>
    <div class="unit"><div class="unit-value" id="s">00</div><div class="unit-label">SEGS</div></div>
  </div>

  <div class="footnote">
    ESTADO&nbsp;DEL&nbsp;SISTEMA: <b>ASCENSO&nbsp;EN&nbsp;PROGRESO</b>
  </div>

</section>

<script>
  // Rising particle field
  const field = document.getElementById('particles');
  const COUNT = 34;
  for (let i = 0; i < COUNT; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const left = Math.random() * 100;
    const duration = 7 + Math.random() * 9;
    const delay = Math.random() * 14;
    const size = 1.5 + Math.random() * 2;
    p.style.left = left + 'vw';
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.animationDuration = duration + 's';
    p.style.animationDelay = delay + 's';
    field.appendChild(p);
  }

  // Countdown — set target launch date here
  const target = new Date();
  target.setDate(target.getDate() + 45);

  function pad(n){ return String(n).padStart(2,'0'); }

  function tick(){
    const now = new Date();
    let diff = Math.max(0, target - now);
    const d = Math.floor(diff / 86400000); diff -= d * 86400000;
    const h = Math.floor(diff / 3600000); diff -= h * 3600000;
    const m = Math.floor(diff / 60000); diff -= m * 60000;
    const s = Math.floor(diff / 1000);
    document.getElementById('d').textContent = pad(d);
    document.getElementById('h').textContent = pad(h);
    document.getElementById('m').textContent = pad(m);
    document.getElementById('s').textContent = pad(s);
  }
  tick();
  setInterval(tick, 1000);
</script>

</body>
</html>
